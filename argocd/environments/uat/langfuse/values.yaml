langfuse:
  nextauth:
    url: "https://langfuse.uat.<YOUR_DOMAIN>"
  ingress:
    hosts:
      - host: langfuse.uat.<YOUR_DOMAIN>
        paths:
          - path: /
            pathType: Prefix
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::<UAT_AWS_ACCOUNT_ID>:role/langfuse-uat"

postgresql:
  host: "<UAT_RDS_ENDPOINT>"

redis:
  host: "<UAT_ELASTICACHE_ENDPOINT>"

clickhouse:
  host: "<UAT_CLICKHOUSE_ENDPOINT>"

s3:
  bucket: "langfuse-uat"
