langfuse:
  nextauth:
    url: "https://langfuse.dev.<YOUR_DOMAIN>"
  ingress:
    hosts:
      - host: langfuse.dev.<YOUR_DOMAIN>
        paths:
          - path: /
            pathType: Prefix
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::<DEV_AWS_ACCOUNT_ID>:role/langfuse-dev"

postgresql:
  host: "<DEV_RDS_ENDPOINT>"

redis:
  host: "<DEV_ELASTICACHE_ENDPOINT>"

clickhouse:
  host: "<DEV_CLICKHOUSE_ENDPOINT>"

s3:
  bucket: "langfuse-dev"
