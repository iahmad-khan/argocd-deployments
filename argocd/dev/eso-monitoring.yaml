apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-monitoring-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/iahmad-khan/infrastructure-as-code
    targetRevision: HEAD
    path: vault-eso/eso/monitoring
  destination:
    name: dev
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
